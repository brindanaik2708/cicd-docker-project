name: Deploy to EC2

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
- name: Checkout
  uses: actions/checkout@v3

- name: Docker Login
  run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

- name: Build Image
  run: docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app .

- name: Push Image
  run: docker push ${{ secrets.DOCKER_USERNAME }}/flask-app

- name: Deploy to EC2
  uses: appleboy/ssh-action@v0.1.6
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ${{ secrets.EC2_USER }}
    key: ${{ secrets.EC2_KEY }}
    script: |
      docker stop flask-app || true
      docker rm flask-app || true
      docker rmi ${{ secrets.DOCKER_USERNAME }}/flask-app || true
      docker pull ${{ secrets.DOCKER_USERNAME }}/flask-app
      docker run -d -p 5000:5000 --name flask-app ${{ secrets.DOCKER_USERNAME }}/flask-app
      docker pull ${{ secrets.DOCKER_USERNAME }}/flask-app
      docker stop flask-app || true
      docker rm flask-app || true
      docker run -d -p 5000:5000 --name flask-app ${{ secrets.DOCKER_USERNAME }}/flask-app
```
